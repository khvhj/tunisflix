  <script>
    function showEpisode(id) {
      var iframes = document.querySelectorAll('iframe');
      iframes.forEach(frame => frame.style.display = 'none');
      var target = document.getElementById(id);
      if (target) {
        target.style.display = 'block';
      }
    }
