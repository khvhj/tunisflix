        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #1e1e1e;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        iframe {
            width: 90%;
            height: 400px;
            margin-top: 20px;
            display: none;

            var players = document.querySelectorAll("iframe");
